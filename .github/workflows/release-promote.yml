name: Promote Release to Production

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release version to promote (must exact match a staging artifact)'
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: release-manifest-and-template

      - name: Promote to Production
        run: |
          chmod +x scripts/deploy/promote-release.sh
          # do not rebuild. uses previously downloaded packaged manifest
          ./scripts/deploy/promote-release.sh "${{ github.event.inputs.releaseVersion }}"
