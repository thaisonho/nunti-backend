name: Release Deploy
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Build and Package
        run: |
          chmod +x scripts/deploy/package-release.sh
          ./scripts/deploy/package-release.sh
          
      - name: Verify Manifest against Schema
        run: |
          npm install -g ajv-cli
          ajv validate -s deploy/release-manifest.schema.json -d release-manifest.json

      - name: Deploy to Staging
        run: |
          chmod +x scripts/deploy/deploy-stage.sh
          ./scripts/deploy/deploy-stage.sh
          
      - name: Upload Manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: |
            release-manifest.json
            packaged.yaml
