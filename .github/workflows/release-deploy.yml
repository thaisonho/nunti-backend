name: Release and Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  package-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Package Release
        run: |
          chmod +x scripts/deploy/package-release.sh
          ./scripts/deploy/package-release.sh

      - name: Verify Manifest
        run: |
          jq -e '.releaseVersion and .gitSha and .templatePath and .templateSha256 and .artifactBucket and .artifactPrefix and .packageCommandVersion and .builtAt' release-manifest.json >/dev/null || (echo "Manifest missing required fields" && exit 1)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest-and-template
          path: |
            release-manifest.json
            packaged.yaml
          retention-days: 14

      - name: Deploy to Staging
        run: |
          chmod +x scripts/deploy/deploy-stage.sh
          ./scripts/deploy/deploy-stage.sh
